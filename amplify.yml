version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -E '^(NEXT_PUBLIC_|DYNAMODB_|SES_|TUTOR_|APP_)' >> .env.production
        - echo "AWS_REGION=${APP_REGION}" >> .env.production
        - echo "AWS_ACCESS_KEY_ID=${APP_ACCESS_KEY_ID}" >> .env.production
        - echo "AWS_SECRET_ACCESS_KEY=${APP_SECRET_ACCESS_KEY}" >> .env.production
        - echo "AWS_S3_BUCKET_NAME=${APP_S3_BUCKET_NAME}" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
